<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Trust Score Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join the Trust Score Engine community</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a unique username" required>
          <small class="form-hint">3-50 characters, alphanumeric and underscore</small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" placeholder="Min 6 characters" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">👁</button>
          </div>
          <div class="password-strength-bar">
            <div class="password-strength-indicator" id="strengthIndicator"></div>
          </div>
          <small class="password-strength-text" id="strengthText">Password strength: Weak</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create Account</button>

        <div class="auth-footer">
          <p>Already have an account? <a href="/login.html">Login here</a></p>
        </div>
      </form>

      <div id="message" class="message hidden"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const passwordInput = document.getElementById('password');
    const strengthIndicator = document.getElementById('strengthIndicator');
    const strengthText = document.getElementById('strengthText');

    passwordInput.addEventListener('input', (e) => {
      const password = e.target.value;
      let strength = 0;
      let strengthLabel = 'Weak';

      if (password.length >= 6) strength += 25;
      if (password.length >= 10) strength += 25;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
      if (/\d/.test(password) && /[!@#$%^&*]/.test(password)) strength += 25;

      strengthIndicator.style.width = strength + '%';
      strengthIndicator.style.backgroundColor = strength < 50 ? '#ef4444' : strength < 75 ? '#f59e0b' : '#10b981';

      if (strength < 50) strengthLabel = 'Weak';
      else if (strength < 75) strengthLabel = 'Medium';
      else strengthLabel = 'Strong';

      strengthText.textContent = `Password strength: ${strengthLabel}`;
    });

    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, confirmPassword }),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.username);
          localStorage.setItem('is_admin', data.is_admin || false);
          showMessage('Signup successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showMessage(data.error || 'Signup failed', 'error');
        }
      } catch (error) {
        showMessage('Network error: ' + error.message, 'error');
      }
    });

    function showMessage(msg, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = msg;
      messageEl.className = `message ${type === 'error' ? 'error' : 'success'}`;
      setTimeout(() => {
        messageEl.className = 'message hidden';
      }, 3000);
    }
  </script>
</body>
</html>
