<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Trust Score Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Login to Trust Score Engine</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email or Username</label>
          <input type="text" id="email" name="email" placeholder="your@email.com or username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">👁</button>
          </div>
        </div>

        <div class="form-group checkbox">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>

        <div class="auth-footer">
          <p>Don't have an account? <a href="/signup.html">Sign up here</a></p>
        </div>
      </form>

      <div id="message" class="message hidden"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const identifier = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Determine if it's email or username
      const isEmail = identifier.includes('@');
      const payload = {
        password,
        ...(isEmail ? { email: identifier } : { username: identifier }),
      };

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.username);
          localStorage.setItem('is_admin', data.is_admin || false);
          showMessage('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showMessage(data.error || 'Login failed', 'error');
        }
      } catch (error) {
        showMessage('Network error: ' + error.message, 'error');
      }
    });

    function showMessage(msg, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = msg;
      messageEl.className = `message ${type === 'error' ? 'error' : 'success'}`;
      setTimeout(() => {
        messageEl.className = 'message hidden';
      }, 3000);
    }
  </script>
</body>
</html>
